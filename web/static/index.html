<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogAggregator Dashboard</title>
    <meta name="description" content="Real-time log aggregation dashboard with filtering and statistics">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #1a2234;
            --bg-card-hover: #1e2a3f;
            --border: #2a3654;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-dim: #64748b;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.2);
            --error: #ef4444;
            --error-bg: rgba(239, 68, 68, 0.12);
            --warn: #f59e0b;
            --warn-bg: rgba(245, 158, 11, 0.12);
            --info: #06b6d4;
            --info-bg: rgba(6, 182, 212, 0.12);
            --success: #10b981;
            --radius: 12px;
            --radius-sm: 8px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background gradient animation */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 20% 0%, rgba(59,130,246,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(139,92,246,0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .app { position: relative; z-index: 1; }

        /* ─── Header ─── */
        .header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            background: rgba(10, 14, 23, 0.8);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(59,130,246,0.3);
        }

        .logo h1 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #e2e8f0, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo span {
            font-size: 12px;
            color: var(--text-dim);
            font-weight: 400;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 20px;
            font-size: 13px;
            color: var(--success);
        }

        .status-dot {
            width: 8px; height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ─── Main Layout ─── */
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 32px;
        }

        /* ─── Stats Cards ─── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .stat-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
        }

        .stat-card.total::after { background: linear-gradient(90deg, var(--accent), #8b5cf6); }
        .stat-card.info::after { background: var(--info); }
        .stat-card.warn::after { background: var(--warn); }
        .stat-card.error::after { background: var(--error); }

        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .stat-card.total .stat-value { color: var(--accent); }
        .stat-card.info .stat-value { color: var(--info); }
        .stat-card.warn .stat-value { color: var(--warn); }
        .stat-card.error .stat-value { color: var(--error); }

        /* ─── Filter Bar ─── */
        .filter-bar {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            margin-bottom: 24px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            white-space: nowrap;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 10px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .search-input::placeholder { color: var(--text-dim); }

        .filter-btn {
            padding: 10px 18px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .filter-btn.active-info { background: var(--info); border-color: var(--info); color: white; }
        .filter-btn.active-warn { background: var(--warn); border-color: var(--warn); color: #1a1a1a; }
        .filter-btn.active-error { background: var(--error); border-color: var(--error); color: white; }

        .filter-divider {
            width: 1px;
            height: 32px;
            background: var(--border);
        }

        /* ─── Log Table ─── */
        .log-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .log-table-header {
            display: grid;
            grid-template-columns: 180px 80px 180px 1fr;
            padding: 12px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            font-weight: 600;
        }

        .log-list {
            max-height: 600px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .log-list::-webkit-scrollbar { width: 6px; }
        .log-list::-webkit-scrollbar-track { background: transparent; }
        .log-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .log-row {
            display: grid;
            grid-template-columns: 180px 80px 180px 1fr;
            padding: 10px 20px;
            border-bottom: 1px solid rgba(42, 54, 84, 0.4);
            font-size: 13px;
            transition: background 0.15s;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .log-row:hover { background: var(--bg-card-hover); }

        .log-row.level-ERROR { border-left: 3px solid var(--error); }
        .log-row.level-WARN { border-left: 3px solid var(--warn); }
        .log-row.level-INFO { border-left: 3px solid var(--info); }

        .log-timestamp {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-dim);
        }

        .log-level {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            width: fit-content;
        }

        .log-level.ERROR { background: var(--error-bg); color: var(--error); }
        .log-level.WARN { background: var(--warn-bg); color: var(--warn); }
        .log-level.INFO { background: var(--info-bg); color: var(--info); }

        .log-source {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .log-message {
            color: var(--text-primary);
            font-size: 13px;
            line-height: 1.4;
        }

        /* ─── Empty States ─── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state p { font-size: 14px; }

        /* ─── Loading ─── */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
        }

        .spinner {
            width: 32px; height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── Responsive ─── */
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .filter-bar { flex-direction: column; }
            .log-table-header, .log-row { grid-template-columns: 1fr; gap: 4px; }
            .main { padding: 16px; }
            .header { padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-inner">
                <div class="logo">
                    <div class="logo-icon">📋</div>
                    <div>
                        <h1>LogAggregator</h1>
                        <span>Real-time log monitoring dashboard</span>
                    </div>
                </div>
                <div class="header-actions">
                    <div class="status-badge">
                        <div class="status-dot"></div>
                        Connected
                    </div>
                </div>
            </div>
        </header>

        <main class="main">
            <!-- Stats Cards -->
            <div class="stats-grid" id="stats-grid">
                <div class="stat-card total">
                    <div class="stat-label">Total Events</div>
                    <div class="stat-value" id="stat-total">—</div>
                </div>
                <div class="stat-card info">
                    <div class="stat-label">Info</div>
                    <div class="stat-value" id="stat-info">—</div>
                </div>
                <div class="stat-card warn">
                    <div class="stat-label">Warnings</div>
                    <div class="stat-value" id="stat-warn">—</div>
                </div>
                <div class="stat-card error">
                    <div class="stat-label">Errors</div>
                    <div class="stat-value" id="stat-error">—</div>
                </div>
            </div>

            <!-- Filter Bar -->
            <div class="filter-bar">
                <div class="filter-group">
                    <span class="filter-label">Level</span>
                    <button class="filter-btn active" data-level="" id="btn-all">All</button>
                    <button class="filter-btn" data-level="INFO" id="btn-info">Info</button>
                    <button class="filter-btn" data-level="WARN" id="btn-warn">Warn</button>
                    <button class="filter-btn" data-level="ERROR" id="btn-error">Error</button>
                </div>
                <div class="filter-divider"></div>
                <input type="text" class="search-input" id="search-input" placeholder="Search logs by keyword..." />
            </div>

            <!-- Log Table -->
            <div class="log-container">
                <div class="log-table-header">
                    <div>Timestamp</div>
                    <div>Level</div>
                    <div>Source</div>
                    <div>Message</div>
                </div>
                <div class="log-list" id="log-list">
                    <div class="loading"><div class="spinner"></div></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ─── State ───
        let currentLevel = '';
        let currentMatch = '';

        // ─── Fetch logs from API ───
        async function fetchLogs() {
            let url = '/api/logs?';
            if (currentLevel) url += `level=${encodeURIComponent(currentLevel)}&`;
            if (currentMatch) url += `match=${encodeURIComponent(currentMatch)}&`;

            try {
                const res = await fetch(url);
                const data = await res.json();
                renderLogs(data.events || []);
            } catch (err) {
                document.getElementById('log-list').innerHTML =
                    '<div class="empty-state"><div class="empty-state-icon">⚠️</div><p>Failed to load logs. Is the server running?</p></div>';
            }
        }

        // ─── Fetch stats ───
        async function fetchStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                const stats = data.stats;
                document.getElementById('stat-total').textContent = stats.total_events || 0;
                document.getElementById('stat-info').textContent = stats.level_counts?.INFO || 0;
                document.getElementById('stat-warn').textContent = stats.level_counts?.WARN || 0;
                document.getElementById('stat-error').textContent = stats.level_counts?.ERROR || 0;
            } catch (err) {
                // stats unavailable
            }
        }

        // ─── Render log rows ───
        function renderLogs(events) {
            const list = document.getElementById('log-list');

            if (!events || events.length === 0) {
                list.innerHTML =
                    '<div class="empty-state"><div class="empty-state-icon">🔍</div><p>No logs match your filters</p></div>';
                return;
            }

            list.innerHTML = events.map(event => {
                const ts = new Date(event.timestamp).toLocaleString('en-US', {
                    year: 'numeric', month: '2-digit', day: '2-digit',
                    hour: '2-digit', minute: '2-digit', second: '2-digit',
                    hour12: false
                });

                const levelStr = levelName(event.level);
                const source = event.source || 'unknown';

                return `
                    <div class="log-row level-${levelStr}">
                        <div class="log-timestamp">${ts}</div>
                        <div><span class="log-level ${levelStr}">${levelStr}</span></div>
                        <div class="log-source">${escapeHtml(source)}</div>
                        <div class="log-message">${escapeHtml(event.message)}</div>
                    </div>
                `;
            }).join('');
        }

        // ─── Map numeric level to string ───
        function levelName(level) {
            switch (level) {
                case 1: return 'INFO';
                case 2: return 'WARN';
                case 3: return 'ERROR';
                default: return 'UNKNOWN';
            }
        }

        // ─── Escape HTML ───
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ─── Filter button handlers ───
        document.querySelectorAll('.filter-btn[data-level]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn[data-level]').forEach(b => {
                    b.className = 'filter-btn';
                });

                const level = btn.dataset.level;
                currentLevel = level;

                if (!level) {
                    btn.classList.add('active');
                } else {
                    btn.classList.add('active-' + level.toLowerCase());
                }

                fetchLogs();
            });
        });

        // ─── Search input handler with debounce ───
        let searchTimeout;
        document.getElementById('search-input').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                currentMatch = e.target.value.trim();
                fetchLogs();
            }, 300);
        });

        // ─── Initial load ───
        fetchStats();
        fetchLogs();
    </script>
</body>
</html>
